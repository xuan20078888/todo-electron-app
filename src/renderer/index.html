<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>待办清单</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- 登录页 -->
    <div id="authPage" class="page auth-page">
      <div class="auth-container">
        <div class="auth-logo">📋</div>
        <h1 class="auth-title">待办清单</h1>
        <p class="auth-subtitle">登录你的账号，管理每一天</p>
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">登录</button>
          <button class="auth-tab" data-tab="register">注册</button>
        </div>
        <form id="loginForm" class="auth-form">
          <div class="form-group"><label>用户名</label><input type="text" id="loginUsername" placeholder="请输入用户名" required></div>
          <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码" required></div>
          <div id="loginError" class="form-error"></div>
          <button type="submit" class="auth-submit-btn">登 录</button>
        </form>
        <form id="registerForm" class="auth-form" style="display:none;">
          <div class="form-group"><label>用户名</label><input type="text" id="regUsername" placeholder="2-20 个字符" required></div>
          <div class="form-group"><label>密码</label><input type="password" id="regPassword" placeholder="至少 4 个字符" required></div>
          <div class="form-group"><label>确认密码</label><input type="password" id="regPasswordConfirm" placeholder="再次输入密码" required></div>
          <div id="registerError" class="form-error"></div>
          <div id="registerSuccess" class="form-success"></div>
          <button type="submit" class="auth-submit-btn">注 册</button>
        </form>
      </div>
    </div>

    <!-- 主页 -->
    <div id="mainPage" class="page main-page" style="display:none;">
      <!-- 顶栏 -->
      <header class="header">
        <div class="header-top">
          <h1>📋 待办清单</h1>
          <div class="header-right">
            <button id="focusModeBtn" class="icon-btn" title="专注模式">🎯</button>
            <button id="notifyBtn" class="icon-btn" title="检查提醒">🔔</button>
            <button id="darkModeBtn" class="icon-btn" title="暗黑模式 (Ctrl+D)">🌙</button>
            <button id="compactBtn" class="icon-btn" title="紧凑视图">📐</button>
            <span id="usernameDisplay" class="username-display"></span>
            <button id="logoutBtn" class="logout-btn">退出</button>
          </div>
        </div>
        <div class="stats">共 <span id="totalCount">0</span> 项，已完成 <span id="completedCount">0</span> 项，逾期 <span id="overdueCount">0</span> 项</div>
      </header>

      <!-- 搜索栏 -->
      <div id="searchBar" class="search-bar" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="搜索任务..." autocomplete="off">
        <button id="searchClear" class="search-clear">×</button>
      </div>

      <!-- 专注模式栏 -->
      <div id="focusBar" class="focus-bar" style="display:none;">
        <span>🎯 专注模式</span>
        <span id="focusTask" class="focus-task-name"></span>
        <button id="focusExit" class="focus-exit-btn">退出专注</button>
      </div>

      <!-- 输入区 -->
      <div class="input-section">
        <div class="input-row">
          <input type="text" id="todoInput" placeholder="添加新的待办任务..." autocomplete="off">
          <button id="addBtn" class="add-btn" title="添加 (Enter)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="input-options">
          <div class="opt-group"><span class="option-label">优先级</span>
            <div class="priority-btns">
              <button class="p-btn" data-priority="high"><span class="p-dot high"></span>高</button>
              <button class="p-btn active" data-priority="medium"><span class="p-dot medium"></span>中</button>
              <button class="p-btn" data-priority="low"><span class="p-dot low"></span>低</button>
            </div>
          </div>
          <div class="opt-group"><span class="option-label">分类</span>
            <div class="category-btns" id="categoryBtns">
              <button class="cat-btn active" data-category="">全部</button>
              <button class="cat-btn" data-category="work">💼</button>
              <button class="cat-btn" data-category="life">🏠</button>
              <button class="cat-btn" data-category="study">📚</button>
            </div>
            <button id="manageCategoriesBtn" class="tool-btn small" title="管理分类">⚙️</button>
          </div>
          <div class="opt-group"><span class="option-label">重复</span>
            <select id="recurringSelect" class="recurring-select">
              <option value="">不重复</option>
              <option value="daily">每天</option>
              <option value="weekly">每周</option>
              <option value="monthly">每月</option>
            </select>
          </div>
          <div class="opt-group"><span class="option-label">截止</span>
            <div class="date-controls">
              <input type="date" id="dueDateInput">
              <button class="quick-date-btn" data-offset="0">今天</button>
              <button class="quick-date-btn" data-offset="1">明天</button>
            </div>
          </div>
          <div class="opt-group"><span class="option-label">标签</span>
            <input type="text" id="tagInput" placeholder="标签+回车" class="tag-input" autocomplete="off">
            <div id="tagPills" class="tag-pills"></div>
          </div>
          <div class="opt-group"><span class="option-label">描述</span>
            <input type="text" id="descInput" placeholder="快速添加描述..." class="desc-input" autocomplete="off">
          </div>
        </div>
      </div>

      <!-- 视图导航 -->
      <div class="view-nav">
        <button class="view-tab active" data-view="tasks">📋 任务</button>
        <button class="view-tab" data-view="calendar">📅 日历</button>
        <button class="view-tab" data-view="stats">📊 统计</button>
        <button class="view-tab" data-view="pomodoro">🍅 番茄钟</button>
        <button class="view-tab" data-view="templates">📑 模板</button>
        <button class="view-tab" data-view="activity">📜 日志</button>
        <button class="view-tab" data-view="recycle">🗑️ 回收站</button>
        <button class="view-tab" data-view="backup">💾 备份</button>
      </div>

      <!-- 任务视图 -->
      <div id="tasksView" class="view-content">
        <div class="toolbar">
          <div class="filter-tabs">
            <button class="tab active" data-filter="all">全部</button>
            <button class="tab" data-filter="active">待完成</button>
            <button class="tab" data-filter="completed">已完成</button>
          </div>
          <div class="toolbar-actions">
            <button id="searchToggle" class="tool-btn" title="搜索 (Ctrl+F)">🔍</button>
            <!-- 排序下拉 -->
            <div class="sort-dropdown-wrap">
              <button id="sortBtn" class="tool-btn" title="排序">📅 排序 ▾</button>
              <div id="sortMenu" class="sort-menu" style="display:none;">
                <button class="sort-option" data-sort="date-asc">📅 日期升序</button>
                <button class="sort-option" data-sort="date-desc">📅 日期降序</button>
                <button class="sort-option" data-sort="priority">⚡ 优先级</button>
                <button class="sort-option" data-sort="created">🕐 创建时间</button>
                <button class="sort-option" data-sort="name">🔤 名称</button>
                <button class="sort-option" data-sort="none">📌 默认(置顶优先)</button>
              </div>
            </div>
            <!-- 标签筛选 -->
            <div class="tag-filter-wrap">
              <button id="tagFilterBtn" class="tool-btn" title="按标签筛选">🏷️ 标签 ▾</button>
              <div id="tagFilterMenu" class="tag-filter-menu" style="display:none;"></div>
            </div>
            <button id="exportBtn" class="tool-btn" title="导出JSON">📤</button>
            <button id="exportCsvBtn" class="tool-btn" title="导出CSV">📄</button>
            <label class="tool-btn" title="导入数据">📥<input type="file" id="importInput" accept=".json" style="display:none;"></label>
            <button id="printBtn" class="tool-btn" title="打印">🖨️</button>
            <button id="clearCompletedBtn" class="tool-btn danger" style="display:none;">🗑 清除已完成</button>
          </div>
        </div>
        <div id="todoList" class="todo-list"></div>
        <div id="emptyState" class="empty-state">
          <div id="onboarding" class="onboarding">
            <div class="welcome-illustration">
              <div class="illust-circle"></div>
              <div class="illust-clipboard"><div class="illust-clip-top"></div>
                <div class="illust-clip-body"><div class="illust-line"></div><div class="illust-line short"></div><div class="illust-line"></div>
                  <div class="illust-check"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
                </div>
              </div>
              <div class="illust-sparkle s1">✨</div><div class="illust-sparkle s2">⭐</div><div class="illust-sparkle s3">💫</div>
            </div>
            <h2 class="welcome-title">欢迎使用待办清单！</h2>
            <p class="welcome-subtitle">从添加第一个任务开始，高效管理你的一天</p>
            <div class="sample-cards" id="sampleCards"></div>
            <button class="skip-btn" id="skipOnboarding">跳过，直接开始 →</button>
          </div>
          <div id="simpleEmpty" class="simple-empty" style="display:none;">
            <div class="empty-emoji-small">🎯</div>
            <p class="empty-title-small">暂无待办任务</p>
            <p class="empty-hint-small">输入内容后按回车，快速添加新任务</p>
          </div>
        </div>
      </div>

      <!-- 日历视图 -->
      <div id="calendarView" class="view-content" style="display:none;">
        <div class="calendar-header">
          <button id="calPrev" class="cal-nav-btn">◀</button>
          <span id="calTitle" class="cal-title"></span>
          <button id="calNext" class="cal-nav-btn">▶</button>
        </div>
        <div class="calendar-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </div>

      <!-- 统计视图 -->
      <div id="statsView" class="view-content" style="display:none;">
        <div class="stats-tabs">
          <button class="stats-tab active" data-period="overview">📋 总览</button>
          <button class="stats-tab" data-period="week">📅 周统计</button>
          <button class="stats-tab" data-period="month">📊 月统计</button>
          <button class="stats-tab" data-period="productivity">🏆 生产力</button>
        </div>
        <!-- 总览 -->
        <div id="statsOverview" class="stats-panel">
          <div class="stats-summary" id="statsSummary"></div>
          <div class="stats-section"><h3>📈 近7天完成趋势</h3><div id="trendChart" class="chart-box"></div></div>
          <div class="stats-section"><h3>📊 分类分布</h3><div id="categoryChart" class="chart-box"></div></div>
          <div class="stats-section"><h3>🎯 优先级分布</h3><div id="priorityChart" class="chart-box"></div></div>
          <div class="stats-section"><h3>🏷️ 标签统计</h3><div id="tagStatsChart" class="chart-box"></div></div>
        </div>
        <!-- 周统计 -->
        <div id="statsWeekly" class="stats-panel" style="display:none;">
          <div class="stats-summary" id="weeklySummary"></div>
          <div class="stats-section"><h3>📅 本周每日完成</h3><div id="weeklyChart" class="chart-box"></div></div>
        </div>
        <!-- 月统计 -->
        <div id="statsMonthly" class="stats-panel" style="display:none;">
          <div class="stats-summary" id="monthlySummary"></div>
          <div class="stats-section"><h3>📊 本月每周完成</h3><div id="monthlyChart" class="chart-box"></div></div>
        </div>
        <!-- 生产力 -->
        <div id="statsProductivity" class="stats-panel" style="display:none;">
          <div id="productivityScore" class="productivity-container"></div>
        </div>
      </div>

      <!-- 番茄钟 -->
      <div id="pomodoroView" class="view-content" style="display:none;">
        <div class="pomo-container">
          <div class="pomo-ring-wrap">
            <svg class="pomo-ring" viewBox="0 0 200 200">
              <circle cx="100" cy="100" r="90" fill="none" stroke="var(--gray-200)" stroke-width="8"/>
              <circle id="pomoProgress" cx="100" cy="100" r="90" fill="none" stroke="var(--primary)" stroke-width="8" stroke-linecap="round" stroke-dasharray="565.48" stroke-dashoffset="0" transform="rotate(-90 100 100)"/>
            </svg>
            <div class="pomo-time" id="pomoTime">25:00</div>
            <div class="pomo-mode" id="pomoMode">专注时间</div>
          </div>
          <!-- 番茄钟关联任务 -->
          <div class="pomo-task-select">
            <label>关联任务：</label>
            <select id="pomoTaskSelect"><option value="">不关联</option></select>
          </div>
          <div class="pomo-controls">
            <button id="pomoStart" class="pomo-btn primary">开始</button>
            <button id="pomoPause" class="pomo-btn" style="display:none;">暂停</button>
            <button id="pomoReset" class="pomo-btn">重置</button>
            <button id="pomoSettings" class="pomo-btn">⚙️ 设置</button>
          </div>
          <!-- 番茄钟设置 -->
          <div id="pomoSettingsPanel" class="pomo-settings" style="display:none;">
            <div class="pomo-setting-row">
              <label>工作时长(分钟)：</label>
              <input type="number" id="pomoWorkDuration" value="25" min="1" max="120">
            </div>
            <div class="pomo-setting-row">
              <label>休息时长(分钟)：</label>
              <input type="number" id="pomoBreakDuration" value="5" min="1" max="60">
            </div>
            <button id="pomoSettingsSave" class="edit-save-btn">保存设置</button>
          </div>
          <div class="pomo-info">🍅 已完成 <strong id="pomoCount">0</strong> 个番茄钟</div>
          <!-- 番茄钟统计 -->
          <div id="pomoStatsPanel" class="pomo-stats"></div>
          <div id="pomoHistory" class="pomo-history"></div>
        </div>
      </div>

      <!-- 模板视图 -->
      <div id="templatesView" class="view-content" style="display:none;">
        <div class="templates-header">
          <h3>📑 任务模板</h3>
          <button id="addTemplateBtn" class="tool-btn">+ 新建模板</button>
        </div>
        <div id="templateEditor" class="template-editor" style="display:none;">
          <input type="text" id="tplName" placeholder="模板名称" class="tpl-input">
          <input type="text" id="tplText" placeholder="任务内容" class="tpl-input">
          <div class="tpl-options">
            <select id="tplPriority"><option value="high">高</option><option value="medium" selected>中</option><option value="low">低</option></select>
            <select id="tplCategory"><option value="">无分类</option><option value="work">工作</option><option value="life">生活</option><option value="study">学习</option></select>
            <select id="tplRecurring"><option value="">不重复</option><option value="daily">每天</option><option value="weekly">每周</option><option value="monthly">每月</option></select>
          </div>
          <input type="text" id="tplTags" placeholder="标签（逗号分隔）" class="tpl-input">
          <div class="tpl-actions"><button id="tplSave" class="edit-save-btn">保存</button><button id="tplCancel" class="edit-cancel-btn">取消</button></div>
        </div>
        <div id="templateList" class="template-list"></div>
      </div>

      <!-- 活动日志 -->
      <div id="activityView" class="view-content" style="display:none;">
        <div class="activity-header"><h3>📜 活动日志</h3></div>
        <div id="activityList" class="activity-list"></div>
      </div>

      <!-- 回收站视图 -->
      <div id="recycleView" class="view-content" style="display:none;">
        <div class="recycle-header">
          <h3>🗑️ 回收站</h3>
          <button id="emptyRecycleBtn" class="tool-btn danger">清空回收站</button>
        </div>
        <div id="recycleList" class="recycle-list"></div>
      </div>

      <!-- 备份视图 -->
      <div id="backupView" class="view-content" style="display:none;">
        <div class="backup-header">
          <h3>💾 数据备份</h3>
          <button id="manualBackupBtn" class="tool-btn">立即备份</button>
        </div>
        <div id="backupList" class="backup-list"></div>
      </div>

      <!-- 分类管理弹窗 -->
      <div id="categoryModal" class="modal-overlay" style="display:none;">
        <div class="modal-dialog">
          <h3>📂 管理分类</h3>
          <div class="category-add-row">
            <input type="text" id="newCatName" placeholder="分类名称" class="tpl-input">
            <input type="text" id="newCatIcon" placeholder="图标(emoji)" class="tpl-input" style="width:60px;">
            <input type="color" id="newCatColor" value="#6366f1" class="color-input-small">
            <button id="addCatBtn" class="edit-save-btn">添加</button>
          </div>
          <div id="categoryManageList" class="category-manage-list"></div>
          <button id="closeCatModal" class="edit-cancel-btn" style="margin-top:12px;">关闭</button>
        </div>
      </div>

      <!-- 批量操作栏 -->
      <div id="bulkBar" class="bulk-bar" style="display:none;">
        <span id="bulkCount">已选 0 项</span>
        <div class="bulk-actions">
          <button id="bulkComplete" class="bulk-btn">✓ 批量完成</button>
          <button id="bulkDelete" class="bulk-btn danger">🗑 批量删除</button>
          <div class="bulk-priority-wrap">
            <button id="bulkPriorityBtn" class="bulk-btn">⚡ 改优先级 ▾</button>
            <div id="bulkPriorityMenu" class="bulk-priority-menu" style="display:none;">
              <button class="bulk-prio-opt" data-priority="high">🔴 高</button>
              <button class="bulk-prio-opt" data-priority="medium">🟡 中</button>
              <button class="bulk-prio-opt" data-priority="low">🟢 低</button>
            </div>
          </div>
          <button id="bulkSelectAll" class="bulk-btn">全选</button>
          <button id="bulkCancel" class="bulk-btn">取消</button>
        </div>
      </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
